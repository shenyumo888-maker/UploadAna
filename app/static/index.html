<!-- HTML 只保留 DOM + Tailwind 样式 -->
 <!DOCTYPE html>
<html lang="zh-CN" class="dark">
<!-- class="dark"：Tailwind 的 暗黑模式开关 只要加了 dark，就能用 dark: 前缀控制深色样式 -->

<!-- <head>：加载“外部工具”和配置 -->
<head>
    <!-- meta：元数据：意为描述数据的数据 有很多不同种类的 <meta> 元素可以被包含进你的页面的 <head> 元素 -->
    <meta charset="UTF-8">
    <!-- viewport作用：让网页在手机端也能显示正常 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- name 指定了 meta 元素的类型；说明该元素包含了什么类型的信息。content 指定了实际的元数据内容。 -->
    
    <title>AI 舆情分析系统</title>
    
    <!-- <script> 元素也应当放在文档的头部，并包含 src 属性来指向需要加载的 JavaScript 文件路径，同时最好加上 defer 以告诉浏览器在解析完成 HTML 后再加载 JavaScript。-->
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script> 
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.2/dist/markdown-it.min.js"></script>

    <!-- html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="/static/style.css">
</head>


<body class="min-h-screen p-6">
    <div id="app" class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2">
                自媒体网络舆情事件分析系统
            </h1>
            <p class="text-slate-400">西藏大学-上海大学多媒体与人工智能安全研究小组</p>
        </header>

        <!-- 输入区域 -->
        <div class="max-w-2xl mx-auto mb-12 glass rounded-2xl p-2 flex shadow-2xl shadow-indigo-500/20" gap-3>
            <input v-model="topic" @keyup.enter="analyze" type="text" placeholder="输入话题，例如：'小米SU7发布会'" class="flex-1 bg-transparent border-none outline-none text-white px-4 text-lg placeholder-slate-500">
            <!-- 生成报告 -->
            <button
                @click="analyze"
                :disabled="loading"
                class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-medium flex items-center justify-center transition hover:-translate-1 hover:scale-105"
            >
                <span v-if="!loading">生成报告</span>
                <div v-else class="loader"></div>
            </button>

            <button
                v-if="result"
                @click="exportPdf"
                class="border ml-2 border-indigo-600 text-indigo-600 px-6 py-3 rounded-xl font-medium hover:bg-indigo-50 transition hover:-translate-1 hover:scale-105"
            >
                导出 PDF
            </button>
        </div>

        <!-- Dashboard -->
        <div 
            v-if="result" 
            class="space-y-6 animate-fade-in-up"
            ref="reportRef"
        >
            
            <!-- Top Stats Row -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <!-- Sentiment Score -->
                <div class="glass rounded-2xl p-6 text-center relative overflow-hidden flex flex-col justify-center">
                    <div class="text-slate-400 text-sm uppercase tracking-wider mb-2">情感指数</div>
                    <div class="text-5xl font-bold" :class="getScoreColor(result.sentiment_score)">
                        {{ result.sentiment_score }}
                    </div>
                     <div class="text-lg mt-1 font-medium text-white">{{ result.sentiment_label }}</div>
                </div>

                 <!-- Keywords -->
                <div class="md:col-span-3 glass rounded-2xl p-6">
                    <div class="text-slate-400 text-sm uppercase tracking-wider mb-4">舆论关键词</div>
                     <div class="flex flex-wrap gap-2">
                        <span v-for="word in result.keywords" class="px-3 py-1 bg-slate-700/50 rounded-full text-sm text-indigo-300 border border-indigo-500/30">
                            #{{ word }}
                        </span>
                    </div>
                </div>
            </div>

            <!-- Charts Row 1 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                 <!-- Trend -->
                <div class="md:col-span-2 glass rounded-2xl p-6 min-h-[350px]">
                    <div class="text-slate-400 text-sm uppercase tracking-wider mb-4">热度趋势</div>
                    <div id="trendChart" class="w-full h-full min-h-[300px]"></div>
                </div>
                <!-- Sentiment Dist -->
                <div class="glass rounded-2xl p-6 min-h-[350px]">
                     <div class="text-slate-400 text-sm uppercase tracking-wider mb-4">情感分布</div>
                    <div id="sentimentChart" class="w-full h-full min-h-[300px]"></div>
                </div>
            </div>

            <!-- Charts Row 2 -->
             <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Source Dist -->
                <div class="glass rounded-2xl p-6 min-h-[350px]">
                     <div class="text-slate-400 text-sm uppercase tracking-wider mb-4">来源分布</div>
                    <div id="sourceChart" class="w-full h-full min-h-[300px]"></div>
                </div>
                <!-- Regional Dist -->
                <div class="glass rounded-2xl p-6 min-h-[350px]">
                    <div class="text-slate-400 text-sm uppercase tracking-wider mb-4">地域分布</div>
                    <div id="regionChart" class="w-full h-full min-h-[300px]"></div>
                </div>
                 <!-- Related Topics -->
                <div class="glass rounded-2xl p-6 min-h-[350px]">
                    <div class="text-slate-400 text-sm uppercase tracking-wider mb-4">关联话题</div>
                    <div id="topicChart" class="w-full h-full min-h-[300px]"></div>
                </div>
            </div>

            <!-- Report -->
            <div class="glass rounded-2xl p-8">
                <div class="flex items-center justify-between mb-6 border-b border-slate-700 pb-4">
                    <h2 class="text-2xl font-bold text-white">深度分析报告</h2>
                    <span class="text-xs text-slate-300 px-2 py-1 rounded">AI Generated</span>
                </div>
                <div class="markdown-body text-slate-300" v-html="renderedMarkdown"></div>
            </div>
        </div>
    </div>

    <!-- Vue 逻辑 -->
    <script src="/static/app.js"></script>
</body>
</html>
